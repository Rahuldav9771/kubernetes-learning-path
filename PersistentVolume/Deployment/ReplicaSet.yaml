EXAMPLE OF REPLICA SET


apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myrs
spec:
  replicas: 8
  selector:
    matchExpressions:
      - key: myname
        operator: In
        values:
          - Rahulk
          - Rahul
          - Rahulku
      - key: env
        operator: NotIn
        values:
          - production
  template:
    metadata:
      labels:
        myname: Rahul
        env: dev
    spec:
      containers:
        - name: c00
          image: ubuntu
          command:
            - /bin/bash
            - -c
            - "while true; do echo 'Hello Ji! How are you'; sleep 5; done"


**************************************END*****************************

kind: Deployment
apiVersion: apps/v1
metadata:
   name: mydeployments
spec:
   replicas: 6
   selector:     
    matchLabels:
     name: deployment
   template:
     metadata:
       name: testpod
       labels:
         name: deployment
     spec:
      containers:
      - name: c00
        image: ubuntu
        command: ["/bin/bash", "-c", "while true; do echo Hello Rahu! How are you; sleep 5; done"]


*******************************************END********************
