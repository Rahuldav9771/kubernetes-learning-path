EXAMPLE OF REPLICATION CONTROLLER

kind: ReplicationController               
apiVersion: v1
metadata:
  name: myreplica
spec:
  replicas: 5            
  selector:        
    myname: Rahul                             
  template:                
    metadata:
      name: testpod6
      labels:            
        myname: Rahul
    spec:
     containers:
     - name: c00
       image: ubuntu
       command: ["/bin/bash", "-c", "while true; do echo Hello-Rahul; sleep 5 ; done"]


