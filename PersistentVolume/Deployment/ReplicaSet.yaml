*****************YAML Files used in demo************************

EXAMPLE OF LABELS


apiVersion: v1
kind: Pod
metadata:
  name: delhipod
  labels:
    env: development
    class: pods
spec:
  containers:
  - name: c00
    image: ubuntu
    command: ["/bin/bash", "-c", "while true; do echo Hello-Rahul; sleep 5; done"]




